<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Grow Book Log</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
/>
<style>
  :root {
    --bg: #0a0a0a;
    --card: #141414;
    --border: #262626;
    --text: #ffffff;
    --muted: #8c8c8c;
    --accent: #39FF14;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); }
  body {
    font-family: Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text);
    min-height: 100vh;
    padding: 32px 16px 64px;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 36px; }
  header h1 {
    font-weight: 900;
    font-size: 30px;
    letter-spacing: 0.02em;
    color: var(--accent);
  }
  header p {
    margin-top: 10px;
    color: var(--muted);
    font-size: 14px;
  }
  header .credit {
    margin-top: 4px;
    font-size: 12px;
    opacity: 0.6;
    letter-spacing: 0.02em;
  }
  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    align-items: start;
  }
  @media (max-width: 880px) {
    .layout { grid-template-columns: 1fr; }
  }
  .form-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 600;
  }
  .field input[type="text"],
  .field input[type="number"],
  .field input[type="date"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    transition: border-color 0.15s;
  }
  .field input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .title-row {
    display: flex;
    gap: 8px;
  }
  .title-row input { flex: 1; }
  .autofill-btn {
    padding: 0 14px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: border-color 0.15s, opacity 0.15s;
  }
  .autofill-btn:hover { border-color: var(--accent); }
  .autofill-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .autofill-status {
    margin-top: 6px;
    font-size: 12px;
    color: var(--muted);
    min-height: 16px;
  }
  .autofill-status.success { color: var(--accent); }
  .autofill-status.error { color: #f59e0b; }
  .result-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .result-chip {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    transition: border-color 0.15s, background 0.15s, color 0.15s;
  }
  .result-chip:hover { border-color: var(--accent); }
  .result-chip.active {
    border-color: var(--accent);
    background: rgba(57, 255, 20, 0.10);
    color: var(--accent);
  }
  .date-row {
    display: flex;
    gap: 8px;
    align-items: stretch;
  }
  .date-row input { flex: 1; }
  .date-stepper {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .date-stepper button {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    cursor: pointer;
    width: 36px;
    flex: 1;
    font-size: 12px;
    padding: 0;
    line-height: 1;
    transition: border-color 0.15s, background 0.15s;
  }
  .date-stepper button:hover {
    border-color: var(--accent);
    background: var(--bg);
  }
  .date-stepper button:active { transform: scale(0.95); }
  .seg {
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    gap: 4px;
  }
  .seg.three { grid-template-columns: 1fr 1fr 1fr; }
  .seg label {
    margin: 0;
    text-align: center;
    padding: 8px 0;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .seg input { display: none; }
  .seg input:checked + span {
    background: var(--accent);
    color: white;
    display: block;
    border-radius: 6px;
    padding: 8px 0;
    margin: -8px 0;
  }
  .seg label:has(input:checked) {
    background: var(--accent);
    color: white;
  }
  .preview { text-align: center; position: sticky; top: 16px; }
  canvas {
    width: 100%;
    max-width: 393px;
    height: auto;
    border-radius: 16px;
    box-shadow: 0 12px 48px rgba(0, 0, 0, 0.6);
    display: block;
    margin: 0 auto;
  }
  .preview.transparent canvas {
    background-image:
      linear-gradient(45deg, #1a1a1a 25%, transparent 25%),
      linear-gradient(-45deg, #1a1a1a 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #1a1a1a 75%),
      linear-gradient(-45deg, transparent 75%, #1a1a1a 75%);
    background-size: 24px 24px;
    background-position: 0 0, 0 12px, 12px -12px, -12px 0;
  }
  .download {
    margin-top: 20px;
    background: var(--accent);
    color: white;
    border: none;
    padding: 14px 28px;
    border-radius: 10px;
    font-family: inherit;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    width: 100%;
    max-width: 393px;
    transition: filter 0.15s, transform 0.05s;
  }
  .download:hover { filter: brightness(1.1); }
  .download:active { transform: scale(0.99); }
  footer {
    margin-top: 64px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>GROW BOOK LOG</h1>
    <p>달리기처럼, 독서도 인증해보세요</p>
    <p class="credit">무료 배포 · @igrow_like · build-isbn-dedup</p>
  </header>

  <div class="layout">
    <form class="form-card" id="form" autocomplete="off">
      <div class="field">
        <label>지표 종류</label>
        <div class="seg">
          <label>
            <input type="radio" name="layout" value="progress" checked />
            Progress형
          </label>
          <label>
            <input type="radio" name="layout" value="pace" />
            페이스형
          </label>
        </div>
      </div>
      <div class="field">
        <label>배경</label>
        <div class="seg">
          <label>
            <input type="radio" name="bg" value="transparent" checked />
            투명
          </label>
          <label>
            <input type="radio" name="bg" value="dark" />
            검정
          </label>
        </div>
      </div>
      <div class="field">
        <label for="title">책 제목</label>
        <div class="title-row">
          <input type="text" id="title" required />
          <button type="button" id="autofill" class="autofill-btn">자동 채우기</button>
        </div>
        <div class="autofill-status" id="autofillStatus"></div>
        <div class="result-chips" id="resultChips"></div>
      </div>
      <div class="field">
        <label for="author">저자</label>
        <input type="text" id="author" />
      </div>
      <div class="field">
        <label for="total">총 페이지 수</label>
        <input type="number" id="total" min="1" required />
      </div>
      <div class="row">
        <div class="field">
          <label for="todayStart">오늘 시작 페이지</label>
          <input type="number" id="todayStart" min="1" required />
        </div>
        <div class="field">
          <label for="todayEnd">오늘 끝 페이지</label>
          <input type="number" id="todayEnd" min="1" required />
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label for="time">읽은 시간 (분)</label>
          <input type="number" id="time" min="0" required />
        </div>
        <div class="field">
          <label for="date">날짜</label>
          <div class="date-row">
            <input type="date" id="date" required />
            <div class="date-stepper">
              <button type="button" id="dateUp" aria-label="다음 날">▲</button>
              <button type="button" id="dateDown" aria-label="이전 날">▼</button>
            </div>
          </div>
        </div>
      </div>
    </form>

    <div class="preview">
      <canvas id="canvas" aria-label="book log card preview"></canvas>
      <button type="button" class="download" id="download">PNG 다운로드</button>
    </div>
  </div>

  <footer>client-side rendering · no data leaves your browser</footer>
</div>

<script>
  const CANVAS = { W: 786, H: 1398 };

  const COLOR = {
    BG: '#101010',
    FG: '#ffffff',
    DIM: '#8c8c8c',
    DIMMER: '#3c3c3c',
    VERY_DIM: '#262626',
    ACCENT: '#39FF14',
  };

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  function getStatType() {
    const el = document.querySelector('input[name="layout"]:checked');
    return el ? el.value : 'progress';
  }

  function getBgMode() {
    const el = document.querySelector('input[name="bg"]:checked');
    return el ? el.value : 'transparent';
  }

  function fillBackground(W, H) {
    if (getBgMode() === 'dark') {
      ctx.fillStyle = COLOR.BG;
      ctx.fillRect(0, 0, W, H);
    } else {
      ctx.clearRect(0, 0, W, H);
    }
  }

  function drawText(text, x, y) {
    ctx.fillText(text, x, y);
  }

  function spiralGhostColor() {
    // Color for the "unread" part of the spiral
    if (getBgMode() === 'transparent') {
      return 'rgba(255,255,255,0.18)';
    }
    return COLOR.VERY_DIM;
  }

  function setupCanvas() {
    const { W, H } = CANVAS;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
    return { W, H };
  }

  function setFont(weight, size) {
    ctx.font = `${weight} ${size}px Pretendard, -apple-system, sans-serif`;
  }

  function squareSpiralPoint(t, cx, cy, rMin, rMax, turns) {
    const theta = t * turns * 2 * Math.PI - Math.PI / 2;
    const r = rMin + (rMax - rMin) * t;
    const cosv = Math.cos(theta), sinv = Math.sin(theta);
    const m = Math.max(Math.abs(cosv), Math.abs(sinv));
    if (m === 0) return [cx, cy];
    return [cx + (r * cosv) / m, cy + (r * sinv) / m];
  }

  function drawSpiralSegment(cx, cy, rMin, rMax, turns, fStart, fEnd, color, lineWidth, n) {
    if (fEnd <= fStart) return;
    ctx.strokeStyle = color;
    ctx.lineWidth = lineWidth;
    ctx.lineCap = 'butt';
    ctx.lineJoin = 'miter';
    ctx.beginPath();
    const nStart = Math.floor(n * fStart);
    const nEnd = Math.floor(n * fEnd);
    const [px, py] = squareSpiralPoint(fStart, cx, cy, rMin, rMax, turns);
    ctx.moveTo(px, py);
    for (let i = nStart + 1; i <= nEnd; i++) {
      const [x, y] = squareSpiralPoint(i / n, cx, cy, rMin, rMax, turns);
      ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  function drawSquareSpiral({ cx, cy, rMax, rMin, todayEnd, total, color, todayWidth = 8 }) {
    const turns = 4;
    const n = 3000;
    const ghostColor = spiralGhostColor();

    drawSpiralSegment(cx, cy, rMin, rMax, turns, 0, 1, ghostColor, 2, n);

    if (total <= 0 || todayEnd <= 0) return; // no progress, just empty ghost

    const f2 = Math.max(0, Math.min(1, todayEnd / total));
    drawSpiralSegment(cx, cy, rMin, rMax, turns, 0, f2, color, todayWidth, n);

    const [ex, ey] = squareSpiralPoint(f2, cx, cy, rMin, rMax, turns);
    const dotR = todayWidth + 4;
    const ringR = dotR + 10;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(ex, ey, dotR, 0, 2 * Math.PI);
    ctx.fill();
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(ex, ey, ringR, 0, 2 * Math.PI);
    ctx.stroke();
  }

  function drawBrandMark(cx, cy, scale = 1) {
    setFont(900, 32 * scale);
    ctx.fillStyle = COLOR.ACCENT;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('GROW', cx, cy);
  }

  function readForm() {
    const title = (document.getElementById('title').value || '').trim();
    const author = (document.getElementById('author').value || '').trim();
    const total = Math.max(0, parseInt(document.getElementById('total').value, 10) || 0);
    const todayStart = Math.max(0, parseInt(document.getElementById('todayStart').value, 10) || 0);
    let todayEnd = parseInt(document.getElementById('todayEnd').value, 10) || 0;
    if (todayEnd > 0 && todayStart > 0) {
      todayEnd = Math.max(todayStart, todayEnd);
      if (total > 0) todayEnd = Math.min(total, todayEnd);
    }
    const time = Math.max(0, parseInt(document.getElementById('time').value, 10) || 0);
    const dateStr = document.getElementById('date').value;
    const date = dateStr ? dateStr.replace(/-/g, '.') : '';
    return { title, author, total, todayStart, todayEnd, time, date };
  }

  function parseValue(value) {
    const m = String(value).match(/^([\d.,]+)(.*)$/);
    if (m) return { num: m[1], unit: m[2] };
    return { num: value, unit: '' };
  }

  function drawDualSizeValue(centerX, midY, num, unit, numSize, unitSize) {
    if (!unit) {
      setFont(900, numSize);
      ctx.textAlign = 'center';
      ctx.fillText(num, centerX, midY);
      return;
    }
    setFont(900, numSize);
    const numW = ctx.measureText(num).width;
    setFont(900, unitSize);
    const unitW = ctx.measureText(unit).width;
    const gap = 4;
    const totalW = numW + gap + unitW;
    const startX = centerX - totalW / 2;
    // Bottom-align: shift unit down so its visual bottom matches number's bottom
    const unitMidY = midY + (numSize - unitSize) / 2;

    ctx.textAlign = 'left';
    setFont(900, numSize);
    ctx.fillText(num, startX, midY);
    setFont(900, unitSize);
    ctx.fillText(unit, startX + numW + gap, unitMidY);
    ctx.textAlign = 'center';
  }

  function calcThirdStat(data) {
    const pages = Math.max(0, data.todayEnd - data.todayStart);
    if (getStatType() === 'pace') {
      if (data.time === 0 || pages === 0) return ['Pace', '0.0p/m'];
      const pace = (pages / data.time).toFixed(1);
      return ['Pace', `${pace}p/m`];
    }
    if (data.total === 0 || data.todayEnd === 0) return ['Progress', '0%'];
    const progress = Math.round((data.todayEnd / data.total) * 100);
    return ['Progress', `${progress}%`];
  }

  function renderCard(W, H, data) {
    const { title, author, todayStart, todayEnd, time, date } = data;
    const pages = Math.max(0, todayEnd - todayStart);

    fillBackground(W, H);

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Date as small "eyebrow" above title
    if (date) {
      ctx.fillStyle = COLOR.FG;
      setFont(700, 22);
      ctx.fillText(date, W / 2, 85);
    }

    // Title (only if entered)
    if (title) {
      ctx.fillStyle = COLOR.FG;
      setFont(900, 44);
      ctx.fillText(title, W / 2, 140);
    }

    // Author alone (no date attached)
    if (author) {
      ctx.fillStyle = COLOR.FG;
      setFont(700, 24);
      ctx.fillText(author, W / 2, 195);
    }

    const stats = [
      ['Pages', String(pages)],
      ['Time', `${time}m`],
      calcThirdStat(data),
    ];

    const baseY = 280;
    const rowGap = 192;
    const NUM_SIZE = 104;
    const UNIT_SIZE = 73; // 70% of NUM_SIZE
    stats.forEach(([label, value], i) => {
      const rowY = baseY + i * rowGap;
      setFont(700, 30);
      ctx.fillText(label, W / 2, rowY);
      const { num, unit } = parseValue(value);
      drawDualSizeValue(W / 2, rowY + 96, num, unit, NUM_SIZE, UNIT_SIZE);
    });

    drawSquareSpiral({
      cx: W / 2, cy: 1050,
      rMax: 160, rMin: 16,
      todayEnd, total: data.total,
      color: COLOR.ACCENT,
      todayWidth: 7,
    });

    drawBrandMark(W / 2, 1340, 1.1);
  }

  function render() {
    const { W, H } = setupCanvas();
    const data = readForm();
    document.querySelector('.preview').classList.toggle(
      'transparent', getBgMode() !== 'dark'
    );
    renderCard(W, H, data);
  }

  function setDefaultDate() {
    const today = new Date();
    const y = today.getFullYear();
    const m = String(today.getMonth() + 1).padStart(2, '0');
    const d = String(today.getDate()).padStart(2, '0');
    document.getElementById('date').value = `${y}-${m}-${d}`;
  }

  function slugify(s) {
    return s.replace(/[\s\\/:*?"<>|]+/g, '_').slice(0, 40);
  }

  const VARIANT_KEYWORDS = [
    '코멘터리', '큰글자', '큰활자', '리커버', '양장본', '양장',
    '합본', '세트', '오디오북', '오디오', '워크북', '필사',
    '스페셜', '한정판', '특별판', '주석', '주해', '해설본',
    '컬러판', '리마스터', '미리보기', '체험판', '리뉴얼',
  ];

  function scoreBook(item, query) {
    const v = item.volumeInfo || {};
    const titleLower = (v.title || '').toLowerCase().trim();
    const queryLower = query.toLowerCase().trim();
    let score = 0;

    // Strong penalty: variant editions
    for (const kw of VARIANT_KEYWORDS) {
      if (titleLower.includes(kw)) score -= 50;
    }

    // Title match strength
    if (titleLower === queryLower) score += 100;
    else if (titleLower.startsWith(queryLower)) score += 30;
    else if (titleLower.includes(queryLower)) score += 15;

    // Page count signal
    const pages = v.pageCount || 0;
    if (pages >= 150) score += 40;
    else if (pages >= 50) score += 15;
    else if (pages > 0) score += 5;
    else score -= 30;

    // Metadata completeness
    if ((v.authors || []).length > 0) score += 10;
    if (v.publisher) score += 5;

    // Romanized authors (often low-quality auto-imported entries)
    for (const a of (v.authors || [])) {
      if (/[ŏŭāīū]/.test(a)) { score -= 30; break; }
    }

    return score;
  }

  let currentResults = [];

  function applyResult(idx) {
    const item = currentResults[idx];
    if (!item) return;
    const v = item.volumeInfo;

    const author = (v.authors || []).join(', ');
    const pageCount = v.pageCount || 0;

    if (author) document.getElementById('author').value = author;
    if (pageCount > 0) document.getElementById('total').value = pageCount;

    const parts = [];
    if (author) parts.push(author);
    if (pageCount > 0) parts.push(`${pageCount}p`);

    const statusEl = document.getElementById('autofillStatus');
    if (parts.length > 0) {
      statusEl.textContent = `✓ ${v.title} · ${parts.join(' · ')}`;
      statusEl.className = 'autofill-status success';
    } else {
      statusEl.textContent = '책은 찾았는데 정보가 부족해요. 직접 입력해주세요.';
      statusEl.className = 'autofill-status error';
    }

    renderResultChips(idx);
    render();
  }

  function renderResultChips(activeIdx) {
    const container = document.getElementById('resultChips');
    container.innerHTML = '';
    if (currentResults.length <= 1) return;

    currentResults.forEach((item, idx) => {
      const v = item.volumeInfo;
      const chip = document.createElement('button');
      chip.type = 'button';
      chip.className = 'result-chip' + (idx === activeIdx ? ' active' : '');
      const pub = v.publisher || '출판사 미상';
      const pages = v.pageCount || 0;
      chip.textContent = pages > 0 ? `${pub} · ${pages}p` : pub;
      chip.addEventListener('click', () => applyResult(idx));
      container.appendChild(chip);
    });
  }

  function getIsbn(item) {
    const ids = item.volumeInfo.industryIdentifiers || [];
    const isbn13 = ids.find(x => x.type === 'ISBN_13');
    const isbn10 = ids.find(x => x.type === 'ISBN_10');
    return (isbn13 && isbn13.identifier) || (isbn10 && isbn10.identifier) || null;
  }

  async function autofillFromTitle() {
    const titleEl = document.getElementById('title');
    const statusEl = document.getElementById('autofillStatus');
    const chipsEl = document.getElementById('resultChips');
    const btn = document.getElementById('autofill');
    const title = titleEl.value.trim();

    chipsEl.innerHTML = '';
    currentResults = [];

    if (!title) {
      statusEl.textContent = '제목을 먼저 입력해주세요';
      statusEl.className = 'autofill-status error';
      return;
    }

    btn.disabled = true;
    statusEl.textContent = '검색 중...';
    statusEl.className = 'autofill-status';

    try {
      const url = `https://www.googleapis.com/books/v1/volumes?q=intitle:${encodeURIComponent(title)}&maxResults=20`;
      const res = await fetch(url);
      const data = await res.json();

      if (!data.items || data.items.length === 0) {
        statusEl.textContent = '결과를 찾지 못했어요. 직접 입력해주세요.';
        statusEl.className = 'autofill-status error';
        return;
      }

      // Score, rank, dedupe by ISBN, top 3 Korean only
      const ranked = data.items
        .map((item) => ({ item, score: scoreBook(item, title) }))
        .sort((a, b) => b.score - a.score)
        .map((r) => r.item);

      const isKoreanText = (s) => /[가-힣]/.test(s || '');
      const normPub = (s) => (s || '').trim().replace(/\s+/g, ' ').toLowerCase();

      const seen = new Set();
      // First pass: Korean publishers, dedupe by ISBN
      for (const item of ranked) {
        const v = item.volumeInfo;
        if (!isKoreanText(v.publisher)) continue;
        const isbn = getIsbn(item);
        const key = isbn || `${normPub(v.publisher)}_${v.pageCount || 0}`;
        if (seen.has(key)) continue;
        seen.add(key);
        currentResults.push(item);
        if (currentResults.length >= 3) break;
      }
      // Fallback: if nothing Korean found, take any
      if (currentResults.length === 0) {
        for (const item of ranked) {
          const v = item.volumeInfo;
          const isbn = getIsbn(item);
          const key = isbn || `${normPub(v.publisher)}_${v.pageCount || 0}`;
          if (seen.has(key)) continue;
          seen.add(key);
          currentResults.push(item);
          if (currentResults.length >= 3) break;
        }
      }

      applyResult(0);
    } catch (e) {
      console.error(e);
      statusEl.textContent = '검색 실패. 잠시 후 다시 시도해주세요.';
      statusEl.className = 'autofill-status error';
    } finally {
      btn.disabled = false;
    }
  }

  function shiftDate(days) {
    const dateEl = document.getElementById('date');
    const today = new Date();
    const t = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
    const current = dateEl.value || t;
    const d = new Date(current + 'T00:00:00');
    d.setDate(d.getDate() + days);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    dateEl.value = `${y}-${m}-${day}`;
    render();
  }

  setDefaultDate();
  document.getElementById('form').addEventListener('input', render);
  document.getElementById('form').addEventListener('change', render);
  document.getElementById('autofill').addEventListener('click', autofillFromTitle);
  document.getElementById('dateUp').addEventListener('click', () => shiftDate(1));
  document.getElementById('dateDown').addEventListener('click', () => shiftDate(-1));
  document.getElementById('title').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      autofillFromTitle();
    }
  });
  document.getElementById('download').addEventListener('click', () => {
    const { title, date } = readForm();
    const stype = getStatType();
    canvas.toBlob((blob) => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `growbooklog_${slugify(title)}_${date || 'today'}_${stype}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 'image/png');
  });

  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(render);
  } else {
    setTimeout(render, 100);
  }
</script>
</body>
</html>
